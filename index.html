.bus-id{padding:14px 22px 12px; border-right:1px solid var(--edge); min-width:300px}

.tel .v{font-family:var(--mono); font-size:15px; color:var(--ink); margin-top:3px; font-weight:500}
.bus-status{margin-left:auto; display:flex; align-items:center; gap:13px; padding:0 22px;

.master{display:flex; align-items:center; gap:9px}
.master .ml{font-family:var(--cond); font-weight:700; letter-spacing:.1em; font-size:14px; text-transform:uppercase}

.lamp{width:9px; height:9px; border-radius:50%; flex:none; position:relative;

.an{display:flex; align-items:center; gap:8px; padding:8px 16px; cursor:pointer;

.an .ans.nominal{color:var(--nominal)} .an .ans.caution{color:var(--caution)} .an .ans.alert{color:var(--alert)}

.panel::before,.panel::after{content:""; position:absolute; width:9px; height:9px; pointer-events:none}
.panel::before{top:5px; left:5px; border-top:1px solid var(--edge2); border-left:1px solid var(--edge2)}

/* ---------- format helpers ---------- */
const U=x=>{x=+x||0;const a=Math.abs(x);
  if(a>=1e9)return '$'+(x/1e9).toFixed(2)+'B';
  if(a>=1e6)return '$'+(x/1e6).toFixed(1)+'M';
  if(a>=1e3)return '$'+(x/1e3).toFixed(0)+'K';
  return '$'+x.toFixed(0);};
const PC=x=>(x*100).toFixed(0)+'%';
const PC1=x=>(x*100).toFixed(1)+'%';
const NUM=x=>(+x||0).toLocaleString('en-US');
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
function delta(cur,prev){ if(prev==null||!prev) return '';
  const d=(cur-prev)/prev*100; const c=d>=0?'up':'down';
  return ` <span class="d ${c}">${d>=0?'▲':'▼'}${Math.abs(d).toFixed(1)}%</span>`; }
const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};

function tick(){
  const now=new Date();

  let s=Math.max(0,Math.floor((Date.now()-snapT)/1000));
  const h=Math.floor(s/3600), m=Math.floor(s%3600/60); s=s%60;
  document.getElementById('elapsed').textContent=
    String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

/* ===== chart helpers (hand-rolled inline SVG; offline-portable, no external lib) ===== */
const CW=720, CH=170, PL=48, PR=14, PT=12, PB=20, IW=CW-PL-PR, IH=CH-PT-PB;
const CORE='var(--core)', FRNT='var(--frontier)';
const CCY_PAL=['var(--frontier)','oklch(0.74 0.135 152)','oklch(0.70 0.16 28)',
  'oklch(0.74 0.115 300)','oklch(0.78 0.10 215)','oklch(0.76 0.12 55)'];
const ccyColor=(c,i)=> c==='eur'?CORE : c==='other'?'oklch(0.52 0.02 140)' : CCY_PAL[i%CCY_PAL.length];
const _xs=(i,n)=> (PL+(n<=1?IW/2:i/(n-1)*IW)).toFixed(1);
const _ys=(v,m)=> (PT+IH-(m>0?v/m*IH:0)).toFixed(1);
function _frame(max,dates){
  let g='<line class="axl" x1="'+PL+'" y1="'+(PT+IH)+'" x2="'+(CW-PR)+'" y2="'+(PT+IH)+'"></line>'+
    '<line class="grid" x1="'+PL+'" y1="'+PT+'" x2="'+(CW-PR)+'" y2="'+PT+'"></line>'+
    '<text class="ax" x="'+(PL-6)+'" y="'+(PT+4)+'" text-anchor="end">'+U(max)+'</text>'+
    '<text class="ax" x="'+(PL-6)+'" y="'+(PT+IH)+'" text-anchor="end">0</text>';
  if(dates.length){
    g+='<text class="ax" x="'+PL+'" y="'+(CH-5)+'" text-anchor="start">'+dates[0]+'</text>'+
       '<text class="ax" x="'+(CW-PR)+'" y="'+(CH-5)+'" text-anchor="end">'+dates[dates.length-1]+'</text>';
  }
  return g;
}
const CHARTS={};   // id -> {type, dates, max, ...} for hover tooltips
const chartBox=(id,inner)=> '<div class="chartbox" data-cid="'+id+'">'+
  '<svg class="chart" viewBox="0 0 '+CW+' '+CH+'" role="img">'+inner+'<g class="hv"></g></svg>'+
  '<div class="tip"></div></div>';

function stackedArea(id,rows,gkey,vkey,topN){
  const dates=[...new Set(rows.map(r=>r.date))].sort();
  if(dates.length<2) return '<div class="cnote">history accrues weekly — not enough days yet.</div>';
  const tot={}; rows.forEach(r=>{tot[r[gkey]]=(tot[r[gkey]]||0)+(+r[vkey]||0);});
  const groups=Object.keys(tot).filter(k=>tot[k]>0).sort((a,b)=>tot[b]-tot[a]);
  const top=groups.slice(0,topN), other=groups.length>topN, keys=[...top,...(other?['other']:[])];
  const di={}; dates.forEach((d,i)=>di[d]=i);
  const ki={}; keys.forEach((k,i)=>ki[k]=i);
  const mat=keys.map(()=>dates.map(()=>0));
  rows.forEach(r=>{ const k=top.indexOf(r[gkey])>=0?r[gkey]:'other', j=ki[k]; if(j==null)return; mat[j][di[r.date]]+=(+r[vkey]||0); });
  const max=Math.max(...dates.map((_,i)=>keys.reduce((s,_,j)=>s+mat[j][i],0)),1);
  let cum=dates.map(()=>0), paths='';
  for(let j=0;j<keys.length;j++){
    const lower=cum.slice(), upper=cum.map((c,i)=>c+mat[j][i]); cum=upper;
    let d='M'+_xs(0,dates.length)+','+_ys(upper[0],max);
    for(let i=1;i<dates.length;i++) d+=' L'+_xs(i,dates.length)+','+_ys(upper[i],max);
    for(let i=dates.length-1;i>=0;i--) d+=' L'+_xs(i,dates.length)+','+_ys(lower[i],max);
    const col=ccyColor(keys[j],j);
    paths+='<path d="'+d+'Z" fill="'+col+'" fill-opacity="0.8" stroke="'+col+'" stroke-width="0.6"></path>';
  }
  const colors=keys.map((k,j)=>ccyColor(k,j));
  CHARTS[id]={type:'stack', dates, keys, colors, mat, max};
  const legend='<div class="legend">'+keys.map((k,j)=>'<span class="lgi"><span class="sw" style="background:'+colors[j]+'"></span>'+esc(k.toUpperCase())+'</span>').join('')+'</div>';
  return chartBox(id,_frame(max,dates.map(d=>d.slice(2,7)))+paths)+legend;
}

function areaChart(id,rows,vkey,color,label){
  const cut=(H.meta&&H.meta.latest_date)||'9999';
  const pts=rows.slice().filter(r=>r.date<=cut).sort((a,b)=>a.date<b.date?-1:1);
  const dates=pts.map(p=>p.date);
  if(dates.length<2) return '<div class="cnote">history accrues weekly — not enough days yet.</div>';
  const vals=pts.map(p=>+p[vkey]||0), max=Math.max(...vals,1);
  let line='M'+_xs(0,dates.length)+','+_ys(vals[0],max);
  for(let i=1;i<dates.length;i++) line+=' L'+_xs(i,dates.length)+','+_ys(vals[i],max);
  const area=line+' L'+_xs(dates.length-1,dates.length)+','+(PT+IH)+' L'+_xs(0,dates.length)+','+(PT+IH)+' Z';
  CHARTS[id]={type:'area', dates, vals, max, color, label:label||''};
  return chartBox(id,_frame(max,dates.map(d=>d.slice(2,7)))+
    '<path d="'+area+'" fill="'+color+'" fill-opacity="0.15"></path>'+
    '<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="1.6"></path>'+
    '<circle cx="'+_xs(dates.length-1,dates.length)+'" cy="'+_ys(vals[vals.length-1],max)+'" r="2.6" fill="'+color+'"></circle>');
}

/* hover: crosshair + value tooltip, wired after panels mount */
function wireHover(){
  Object.keys(CHARTS).forEach(id=>{
    const box=document.querySelector('[data-cid="'+id+'"]'); if(!box) return;
    const svg=box.querySelector('svg'), hv=svg.querySelector('.hv'), tip=box.querySelector('.tip');
    const C=CHARTS[id], n=C.dates.length;
    function move(clientX){
      const r=svg.getBoundingClientRect(); if(!r.width) return;
      let i=Math.round(((clientX-r.left)/r.width*CW-PL)/IW*(n-1)); i=Math.max(0,Math.min(n-1,i));
      const x=+_xs(i,n); let html, topVal;
      let mk='<line class="cl" x1="'+x+'" y1="'+PT+'" x2="'+x+'" y2="'+(PT+IH)+'"></line>';
      if(C.type==='area'){ const v=C.vals[i], y=+_ys(v,C.max); topVal=v;
        mk+='<circle cx="'+x+'" cy="'+y+'" r="3.2" fill="'+C.color+'"></circle>';
        html='<div class="td">'+C.dates[i]+'</div><div class="tr"><span class="tk">'+esc(C.label)+'</span><span class="tv">'+U(v)+'</span></div>';
      } else {
        let cum=0; for(let j=0;j<C.keys.length;j++) cum+=C.mat[j][i]; topVal=cum;
        mk+='<circle cx="'+x+'" cy="'+_ys(cum,C.max)+'" r="3.2" fill="var(--ink)"></circle>';
        const rs=C.keys.map((k,j)=>({k,c:C.colors[j],v:C.mat[j][i]})).filter(o=>o.v>0).sort((a,b)=>b.v-a.v);
        html='<div class="td">'+C.dates[i]+' · total '+U(cum)+'</div>'+
          rs.map(o=>'<div class="tr"><span class="tk"><span class="sw" style="background:'+o.c+'"></span>'+esc(o.k.toUpperCase())+'</span><span class="tv">'+U(o.v)+'</span></div>').join('');
      }
      hv.innerHTML=mk; tip.innerHTML=html; tip.style.opacity='1';
      const px=x/CW*r.width, py=_ys(topVal,C.max)/CH*r.height;
      tip.style.left=Math.max(6,Math.min(r.width-6,px))+'px';
      tip.style.top=Math.max(2,py)+'px';
    }
    svg.addEventListener('mousemove',e=>move(e.clientX));
    svg.addEventListener('mouseleave',()=>{hv.innerHTML=''; tip.style.opacity='0';});
  });
}

function barRank(items,lkey,vkey,color,n){
  const rows=items.filter(it=>(+it[vkey]||0)>0).sort((a,b)=>(+b[vkey]||0)-(+a[vkey]||0)).slice(0,n||7);
  const max=Math.max(...rows.map(it=>+it[vkey]||0),1);
  return rows.map(it=>{ const v=+it[vkey]||0;
    return '<div class="brow"><div class="bl">'+esc(String(it[lkey]))+'</div>'+
      '<div class="bt"><i style="width:'+(v/max*100).toFixed(1)+'%;background:'+color+'"></i></div>'+
      '<div class="bv">'+U(v)+'</div></div>';
  }).join('');
}

      '<td>'+U(r.fees_usd)+'</td><td>'+apr+(r.tvl_partial?' <span class="tag par">P</span>':'')+'</td></tr>';
  });
  html+='</tbody></table><div class="note" style="padding-top:8px">'+
    '<span class="tag par">P</span> TVL partial (singleton / non-EVM pools have no recoverable per-pool TVL); APR understated there. Fees '+PC(F.estimated_usd/F.total_usd)+' estimated-tier.</div>';
  panel('pLead','col7','Venues · Leaderboard','',html);
})();

/* ---------- footer ---------- */
document.getElementById('foot').innerHTML=
  'READ-ONLY MARKET STRUCTURE · NO CAPITAL · NO ON-CHAIN ACTIONS<br>'+
  'SOURCES: Allium (supply_beta · dex.trades_evm · dex.pools · erc20_balances_latest) · '+
  'Generated '+S.meta.generated_at.slice(0,19).replace('T',' ')+'Z · DQ gate GREEN before publish<br>'+
  'v1 caveats: TVL/fees partial on non-EVM chains · single-MM concentration screen (top-1 sender ≥80%) · FX-gap-by-size + external reference = v1.5';

/* ---------- wire chart hover (panels are mounted) ---------- */
wireHover();

/* ---------- staggered power-on reveal ---------- */
const panels=[...document.querySelectorAll('.panel')];
if(matchMedia('(prefers-reduced-motion:reduce)').matches){ panels.forEach(p=>p.classList.add('rev')); }
else { panels.forEach((p,i)=>setTimeout(()=>p.classList.add('rev'), 90+i*55)); }
</script>
