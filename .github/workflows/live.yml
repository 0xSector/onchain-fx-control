# @purpose live.yml — always-on host for the Onchain FX live paper LP. Runs TWO parallel books each tick:
#   the NAKED forward-press LP (state.json + live.html) and the DELTA-HEDGED book (hedged/ + live_hedged.html,
#   ONCHAIN_FX_HEDGE=1 — a paper short-EUR overlay sized to the LP's live EUR delta, isolating fee-minus-LVR
#   carry). The hedged step is continue-on-error so the overlay can NEVER freeze the validated naked book.
#   GitHub Pages serves both at the "Live LP" / "Live LP · Hedged" tabs. No secrets (public feeds), no pip
#   (pure stdlib — economics vendored in live_econ.py, Pyth/RPC via urllib). PAPER ONLY — NAV is notional.

name: live-lp

on:
  schedule:
    - cron: "*/15 * * * *"      # every 15 min; disable the schedule to pause the press
  workflow_dispatch: {}          # manual single tick

permissions:
  contents: write

concurrency:
  group: live-lp
  cancel-in-progress: true       # never let two ticks race on the same state

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # stdlib only — no `pip install`

      - name: Naked book — one live tick → render live.html
        env:
          ONCHAIN_FX_LIVE_DIR: ${{ github.workspace }}   # state + ledger + UI at the repo root
          ONCHAIN_FX_LIVE_OUT: live.html                 # publish the watch UI at the Live LP tab
        run: python live_lp.py tick

      - name: Hedged book — one live tick → render live_hedged.html
        continue-on-error: true                          # a hedge-overlay fault must never block the naked book
        env:
          ONCHAIN_FX_HEDGE: "1"                          # turn the paper short-EUR overlay on for THIS book only
          ONCHAIN_FX_LIVE_DIR: ${{ github.workspace }}/hedged   # its own state/ledger (forked from the naked book)
          ONCHAIN_FX_LIVE_OUT: ${{ github.workspace }}/live_hedged.html   # absolute → publish at the repo root
        run: python live_lp.py tick

      - name: Commit state + watch UIs (both books)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f live.html state.json live_ledger.jsonl
          git add -f live_hedged.html hedged/state.json hedged/live_ledger.jsonl hedged/hedge_eval.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no change this tick"; exit 0
          fi
          git commit -m "live tick $(date -u +%FT%TZ)"
          # retry-push in case a Pages build or a near-simultaneous run moved HEAD
          for i in 1 2 3; do
            git push && break || { git pull --rebase --autostash && sleep 3; }
          done
